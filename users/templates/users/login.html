<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #BF341F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            animation: float 4s infinite ease-in-out;
            pointer-events: none;
        }

        .bubble:nth-child(1) { width: 120px; height: 120px; left: 8%; top: 15%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 160px; height: 160px; right: 10%; top: 10%; animation-delay: 0.5s; }
        .bubble:nth-child(3) { width: 80px; height: 80px; left: 25%; bottom: 25%; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 140px; height: 140px; right: 20%; bottom: 20%; animation-delay: 1.5s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 50%; top: 5%; animation-delay: 2s; }
        .bubble:nth-child(6) { width: 100px; height: 100px; left: 3%; top: 55%; animation-delay: 0.8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(35px, -25px) scale(1.1); opacity: 0.5; }
            50% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.2; }
            75% { transform: translate(25px, -15px) scale(1.05); opacity: 0.4; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        .card-header {
            background: transparent;
            border: none;
            text-align: center;
            padding: 0 0 30px 0;
        }

        .card-header h3 {
            font-size: 26px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
            letter-spacing: 1px;
        }

        .card-header h3 span {
            color: #BF341F;
            font-weight: 600;
        }

        .card-header .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.15s ease;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-control:focus {
            border-color: #BF341F;
            box-shadow: 0 0 0 3px rgba(191, 52, 31, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-primary {
            background: #BF341F;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 400;
            font-size: 14px;
            transition: all 0.15s ease;
            width: 100%;
            color: #ffffff;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            background: #a82d1b;
            transform: scale(1.02);
        }

        .card-footer {
            background: transparent;
            border: none;
            text-align: center;
            padding: 20px 0 0 0;
        }

        .card-footer a {
            color: rgba(255, 255, 255, 0.25);
            text-decoration: none;
            font-weight: 300;
            font-size: 13px;
            transition: all 0.15s ease;
            letter-spacing: 0.3px;
        }

        .card-footer a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .alert {
            border-radius: 8px;
            border: none;
            background: rgba(191, 52, 31, 0.15);
            color: #ff6b5a;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        label {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .mb-3 {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="card">
        <div class="card-header">
            <h3><span>●</span> Вход</h3>
            <div class="sub">Войдите в свой аккаунт</div>
        </div>
        <div class="card-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" class="form-control" placeholder="Логин" required>
                </div>
                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
        </div>
        <div class="card-footer">
            <a href="{% url 'register' %}">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
