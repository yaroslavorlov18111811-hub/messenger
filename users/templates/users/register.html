<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #BF341F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            animation: float 4s infinite ease-in-out;
            pointer-events: none;
        }
        .bubble:nth-child(1) { width: 120px; height: 120px; left: 8%; top: 15%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 160px; height: 160px; right: 10%; top: 10%; animation-delay: 0.5s; }
        .bubble:nth-child(3) { width: 80px; height: 80px; left: 25%; bottom: 25%; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 140px; height: 140px; right: 20%; bottom: 20%; animation-delay: 1.5s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 50%; top: 5%; animation-delay: 2s; }
        .bubble:nth-child(6) { width: 100px; height: 100px; left: 3%; top: 55%; animation-delay: 0.8s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); opacity: 0.3; }
            25% { transform: translate(35px,-25px) scale(1.1); opacity: 0.5; }
            50% { transform: translate(-20px,20px) scale(0.9); opacity: 0.2; }
            75% { transform: translate(25px,-15px) scale(1.05); opacity: 0.4; }
            100% { transform: translate(0,0) scale(1); opacity: 0.3; }
        }

        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-header {
            background: transparent;
            border: none;
            text-align: center;
            padding: 0 0 28px 0;
        }
        .card-header h3 {
            font-size: 26px;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            margin: 0;
            letter-spacing: 1px;
        }
        .card-header h3 span { color: #BF341F; font-weight: 600; }
        .card-header .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.15s ease;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.85);
            outline: none;
            width: 100%;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }
        .form-control:focus {
            border-color: #BF341F;
            box-shadow: 0 0 0 3px rgba(191,52,31,0.15);
            background: rgba(255,255,255,0.08);
        }

        .btn-primary {
            background: #BF341F;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.15s ease;
            width: 100%;
            color: #fff;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:hover { background: #a82d1b; }

        .card-footer {
            background: transparent;
            border: none;
            text-align: center;
            padding: 20px 0 0 0;
        }
        .card-footer a {
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            font-weight: 300;
            font-size: 14px;
            transition: all 0.15s ease;
            letter-spacing: 0.3px;
        }
        .card-footer a:hover { color: rgba(255,255,255,0.6); }

        .alert {
            border-radius: 10px;
            border: none;
            background: rgba(191,52,31,0.15);
            color: #ff6b5a;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        label {
            font-weight: 300;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .mb-3 { margin-bottom: 18px; }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; max-width: 100%; margin: 16px; }
            .card-header h3 { font-size: 22px; }
            .form-control { padding: 16px; font-size: 16px; }
            .btn-primary { padding: 16px; font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>

    <div class="card">
        <div class="card-header">
            <h3><span>●</span> Регистрация</h3>
            <div class="sub">Создайте новый аккаунт</div>
        </div>
        <div class="card-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" class="form-control" placeholder="Логин" required>
                </div>
                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="Пароль" required>
                </div>
                <div class="mb-3">
                    <label>Повторите пароль</label>
                    <input type="password" name="password2" class="form-control" placeholder="Повторите пароль" required>
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
        </div>
        <div class="card-footer">
            <a href="{% url 'login' %}">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</body>
</html>
