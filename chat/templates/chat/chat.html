<!DOCTYPE html>
<html>
<head>
    <title>Мессенджер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #BF341F 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Шарики */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            animation: float 4s infinite ease-in-out;
            pointer-events: none;
            will-change: transform;
        }

        .bubble:nth-child(1) { width: 120px; height: 120px; left: 5%; top: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 180px; height: 180px; right: 8%; top: 5%; animation-delay: 0.5s; }
        .bubble:nth-child(3) { width: 80px; height: 80px; left: 20%; bottom: 20%; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 150px; height: 150px; right: 15%; bottom: 15%; animation-delay: 1.5s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 45%; top: 8%; animation-delay: 2s; }
        .bubble:nth-child(6) { width: 100px; height: 100px; left: 2%; top: 50%; animation-delay: 0.8s; }
        .bubble:nth-child(7) { width: 130px; height: 130px; right: 3%; top: 55%; animation-delay: 1.2s; }
        .bubble:nth-child(8) { width: 70px; height: 70px; left: 55%; bottom: 10%; animation-delay: 1.7s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(40px, -30px) scale(1.1); opacity: 0.5; }
            50% { transform: translate(-20px, 25px) scale(0.9); opacity: 0.2; }
            75% { transform: translate(30px, -15px) scale(1.05); opacity: 0.4; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        .chat-container {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
            height: calc(100vh - 40px);
        }

        /* Верхняя панель - ПРОЗРАЧНАЯ как карточка с контактами */
        .top-bar {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 14px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar .brand {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .top-bar .brand span {
            color: #BF341F;
            font-weight: 600;
        }

        .top-bar .user-info {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            font-size: 13px;
        }

        .top-bar .user-info strong {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        .top-bar .btn-logout {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 5px 16px;
            transition: all 0.2s ease;
            font-weight: 300;
            font-size: 12px;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .top-bar .btn-logout:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Карточки */
        .card-glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            overflow: hidden;
            height: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-glass .card-header {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .user-list {
            height: 500px;
            overflow-y: auto;
            padding: 0;
        }

        .user-list::-webkit-scrollbar {
            width: 4px;
        }
        .user-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .user-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .user-item {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }

        .user-item.active-user {
            background: rgba(191, 52, 31, 0.25);
            border-left: 3px solid #BF341F;
            color: #ffffff;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #BF341F;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 500;
            font-size: 13px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .user-item strong {
            font-weight: 400;
            font-size: 14px;
        }

        .chat-messages {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        .message {
            margin-bottom: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.sent {
            background: #BF341F;
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            border-bottom-left-radius: 2px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.35;
            margin-top: 4px;
            display: block;
            letter-spacing: 0.3px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        .card-footer {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 20px;
        }

        .input-group-custom {
            display: flex;
            gap: 10px;
        }

        .input-group-custom input {
            flex: 1;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 16px;
            font-size: 13px;
            transition: all 0.15s ease;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            outline: none;
        }

        .input-group-custom input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .input-group-custom input:focus {
            border-color: #BF341F;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group-custom input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-send {
            background: #BF341F;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            color: #ffffff;
            font-weight: 400;
            font-size: 13px;
            transition: all 0.15s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .btn-send:hover:not(:disabled) {
            background: #a82d1b;
            transform: scale(1.02);
        }

        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .user-list .empty-text {
            padding: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .chat-container { height: calc(100vh - 20px); margin: 10px auto; padding: 0 10px; }
            .user-list { height: 200px; }
            .chat-messages { height: 280px; }
            .top-bar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
            .top-bar .brand { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="chat-container">
        <!-- Верхняя панель - ПРОЗРАЧНАЯ -->
        <div class="top-bar">
            <span class="brand"><span>●</span> Мессенджер</span>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span class="user-info">Привет, <strong>{{ user.username }}</strong></span>
                <a href="{% url 'logout' %}" class="btn-logout">Выйти</a>
            </div>
        </div>

        <div class="row" style="height: calc(100% - 80px);">
            <div class="col-md-4" style="height: 100%;">
                <div class="card-glass">
                    <div class="card-header">Контакты</div>
                    <div class="user-list" id="user-list">
                        {% for other_user in users %}
                            <div class="user-item" onclick="selectUser({{ other_user.id }}, '{{ other_user.username }}')">
                                <div class="user-avatar">{{ other_user.username|first|upper }}</div>
                                <strong>{{ other_user.username }}</strong>
                            </div>
                        {% empty %}
                            <div class="empty-text">Нет других пользователей</div>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="col-md-8" style="height: 100%;">
                <div class="card-glass d-flex flex-column" style="height: 100%;">
                    <div class="card-header" id="chat-header">Выберите контакт</div>
                    <div class="chat-messages flex-grow-1" id="chat-messages">
                        <div class="empty-state">
                            <div class="icon">⌨️</div>
                            <span>Выберите собеседника</span>
                        </div>
                    </div>
                    <div class="card-footer mt-auto">
                        <div class="input-group-custom">
                            <input type="text" id="message-input" placeholder="Сообщение..." disabled>
                            <button class="btn-send" id="send-btn" disabled>Отправить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        let messageCache = {};

        function selectUser(userId, username) {
            selectedUserId = userId;
            document.getElementById('chat-header').textContent = username;
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('message-input').focus();
            
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active-user'));
            event.target.closest('.user-item').classList.add('active-user');
            
            loadMessages(userId);
        }

        function loadMessages(userId) {
            fetch('/get_messages/' + userId + '/')
                .then(response => response.json())
                .then(messages => {
                    const container = document.getElementById('chat-messages');
                    
                    const cacheKey = JSON.stringify(messages);
                    if (messageCache[userId] === cacheKey) return;
                    messageCache[userId] = cacheKey;
                    
                    container.innerHTML = '';
                    
                    if (messages.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">💭</div>
                                <span>Нет сообщений</span>
                            </div>
                        `;
                        return;
                    }
                    
                    messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'message ' + (msg.sender === {{ user.id }} ? 'sent' : 'received');
                        div.innerHTML = msg.content + '<span class="time">' + msg.timestamp + '</span>';
                        container.appendChild(div);
                    });
                    
                    container.scrollTop = container.scrollHeight;
                });
        }

        function sendMessage() {
            if (!selectedUserId) return;
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            
            const formData = new FormData();
            formData.append('receiver_id', selectedUserId);
            formData.append('content', content);
            
            fetch('/send_message/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok') {
                    input.value = '';
                    messageCache[selectedUserId] = null;
                    loadMessages(selectedUserId);
                }
            });
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(() => {
            if (selectedUserId) loadMessages(selectedUserId);
        }, 3000);
    </script>
</body>
</html>
